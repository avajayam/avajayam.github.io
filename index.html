    <style>
      :root {
        --color-cyan: #33b1bf;
        --color-shadow: #076474;
        --color-orange: #f90;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background-image: linear-gradient(135deg, var(--color-cyan), rgba(11, 113, 128, 1));
      }

      .bg {
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
        opacity: 0.8;
      }

      .c {
        height: 360px;
        display: flex;
        align-items: center;
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .tit {
        white-space: nowrap;
        text-align: center;
        /* writing-mode: vertical-rl;
      text-orientation: mixed; */
        position: absolute;
        top: -54px;
        left: 0;
        right: 0;

        .emphasize {
          font-size: 41px;
          color: #4fd6e4;
          font-family: cursive;
          letter-spacing: 6px;
          text-shadow:
            -1px -1px #cefff3,
            1px 1px var(--color-shadow);
        }
      }

      .intro {
        height: 340px;
        background-image: linear-gradient(
          to left,
          rgba(51, 177, 191, 0),
          rgba(51, 177, 191, 0.7) 50%,
          rgba(51, 177, 191, 0)
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        flex: 1;
        position: relative;

        &::before {
          height: 1px;
          content: '';
          background: linear-gradient(
            to left,
            rgba(255, 255, 255, 0) 20%,
            rgba(255, 255, 255, 0.7) 50%,
            rgba(255, 255, 255, 0) 80%
          );
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
        }
        &::after {
          height: 1px;
          content: '';
          background: linear-gradient(
            to left,
            rgba(51, 177, 191, 0) 20%,
            rgba(7, 100, 116, 0.4) 50%,
            rgba(51, 177, 191, 0) 80%
          );
          position: absolute;
          bottom: -1px;
          left: 0;
          right: 0;
        }

        .ic_c {
          margin-bottom: 20px;
          display: flex;
        }

        .circle {
          width: 52px;
          height: 52px;
          margin: 0 5px;
          color: #fff;
          border-radius: 10px;
          background: rgba(255, 255, 255, 0.1);
          display: flex;
          align-items: center;
          justify-content: center;
          transition: 0.3s linear;
          cursor: pointer;

          &:hover {
            background: var(--color-orange);
            transform: scale(1.1);
          }

          svg {
            transition: 0.3s linear;
            fill: #fff;
            display: block;
          }
        }

        .ic_thememode_switch {
          &::before {
            font-size: 18px;
            content: '明';
          }

          &::after {
            font-size: 12px;
            content: '/暗';
            opacity: 0.6;
          }
        }
      }

      .link_c {
        margin-top: 110px;
        padding: 20px 0;
      }

      .link {
        height: 64px;
        padding: 0 48px;
        line-height: 64px;
        font-size: 18px;
        color: #fff;
        text-decoration: none;
        border-radius: 32px;
        box-shadow:
          1px 2px var(--color-shadow),
          -1px -1px #cefff3;
        background: linear-gradient(to left, var(--color-cyan), rgba(51, 177, 191, 0.5));
        transition: 0.3s linear;
        display: inline-block;

        &:hover {
          background: var(--color-orange) !important;
          transform: scale(1.05);
        }
      }

      .copyright {
        font-size: 12px;
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        position: absolute;
        left: 0;
        right: 0;
        bottom: -24px;
      }

      .dark {
        background-image: linear-gradient(-60deg, var(--color-cyan), #000);

        .bg {
          opacity: 1;
        }

        .intro {
          background-image: linear-gradient(to left, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0));

          &::before {
            background: linear-gradient(
              to left,
              rgba(7, 100, 116, 0) 20%,
              rgba(7, 100, 116, 0.4) 50%,
              rgba(7, 100, 116, 0) 80%
            );
          }
          &::after {
            height: 1px;
            content: '';
            background: linear-gradient(to left, rgba(0, 0, 0, 0) 20%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0) 80%);
          }
        }

        .link {
          background: linear-gradient(to right, rgba(0, 0, 0, 0.4), rgba(7, 100, 116, 0.4));
          box-shadow:
            1px 1px var(--color-cyan),
            0 0 8px var(--color-cyan);
        }

        .catoptric_light {
          mask: linear-gradient(135deg, #000c 35%, #000 50%, #000c 65%) 100% 100%/300% 300%;
          animation: ani_light 3s infinite;
        }

        .ic_thememode_switch {
          &::before {
            content: '暗';
          }

          &::after {
            content: '/明';
          }
        }

        .tit .emphasize {
          color: transparent;
          font-family: cursive;
          letter-spacing: 6px;
          text-shadow:
            1px 1px var(--color-cyan),
            0 0 8px var(--color-cyan);
        }
      }

      @keyframes ani_light {
        0% {
          mask-position: 100% 100%;
        }

        100% {
          mask-position: 0 0;
        }
      }
    </style>
  </head>

  <body>
    <script>
      function setThemeMode(themeMode) {
        if ('dark' === themeMode) {
          window.isDarkThemeMode = true
          document.body.classList.remove('light')
        } else {
          window.isDarkThemeMode = false
          document.body.classList.remove('dark')
        }

        document.body.classList.add(themeMode)
      }

      ;(function () {
        const hour = new Date().getHours()
        if (hour >= 6 && hour < 18) {
          setThemeMode('light')
        } else {
          setThemeMode('dark')
        }
      })()
    </script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",

    <script type="module">
      import * as THREE from 'three'
      import { FRAGMENTSHADER } from './res/js/shader_toy.js'

      const container = document.querySelector('.bg')
      const BCRect = container.getBoundingClientRect()
      const _w = BCRect.width
      const _h = BCRect.height

      const camera = new THREE.Camera()
      camera.position.z = 1

      const scene = new THREE.Scene()
      scene.add(camera)

      const renderer = new THREE.WebGLRenderer({})
      renderer.setSize(_w, _h)

      const uniforms = {
        iTime: {
          type: 'f',
          value: 0
        },
        iResolution: {
          value: new THREE.Vector3(_w, _h, 1)
        }
      }

      const material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
        }
      `,
        fragmentShader: '',
        transparent: true,
        vertexColors: true
      })

      const themeModeResponse = () => {
        if (isDarkThemeMode) {
          material.fragmentShader = FRAGMENTSHADER.star
          renderer.setPixelRatio(window.devicePixelRatio)
        } else {
          material.uniforms.uTexture = {
            value: new THREE.TextureLoader().load('./res/img/avatar.jpg')
          }

          material.fragmentShader = FRAGMENTSHADER.raindrop
          renderer.setPixelRatio(1)
        }

        material.needsUpdate = true
      }

      themeModeResponse()

      const geometry = new THREE.PlaneGeometry(3, 3)
      const particleSystem = new THREE.Mesh(geometry, material)

      scene.add(particleSystem)
      container.appendChild(renderer.domElement)

      const clock = new THREE.Clock()

      const ani = () => {
        renderer.render(scene, camera)
        material.uniforms.iTime.value += clock.getDelta()

        requestAnimationFrame(ani)
      }

      ani()

      window.addEventListener('resize', () => {
        const BCRect = container.getBoundingClientRect()
        const _w = BCRect.width
        const _h = BCRect.height

        material.uniforms.iResolution.x = _w
        material.uniforms.iResolution.y = _h

        camera.aspect = _w / _h
        renderer.setSize(_w, _h)
      })

      const btnTMSwitch = document.querySelector('.ic_thememode_switch')
      btnTMSwitch.addEventListener('click', () => {
        if (isDarkThemeMode) {
          setThemeMode('light')
        } else {
          setThemeMode('dark')
        }

        themeModeResponse()
      })
    </script>
